<!-- category.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Posts</title>
    <link rel="stylesheet" href="/pages/css/altstyles.css">
    <link rel="stylesheet" href="/pages/css/about.css">
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <div class="logo">
                    <h1><a href="/index.html">Kris Yotam</a></h1>
                </div>
                <div class="nav-links">
                    <ul>
                        <li><a href="/pages/html/about.html">About</a></li>
                        <li><a href="https://www.goodreads.com/review/list/163025645-kris-yotam?shelf=mathematics">Shelves</a></li>
                        <li>
                            <label class="switch">
                                <input type="checkbox" id="darkModeToggle">
                                <span class="slider"></span>
                            </label>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>

        <h2 id="categoryTitle">Posts in Category</h2>

        <table id="postsTable">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamically filled rows will go here -->
            </tbody>
        </table>
    </div>

    <div class="footer-grounding">
        <footer class="footer">
            <a href="https://github.com/krisyotam" class="source-link">Kris Yotam (@krisyotam)</a>
            <a href="https://gitserver.vercel.app/" class="source-link">Source</a>
        </footer>
    </div>

    <script src="/pages/js/dark-mode.js"></script>
    <script>
        const API_URL = "https://kris-yotam.ghost.io/ghost/api/content/posts/";
        const API_KEY = "3956cf71a4a7a35e5ead9bf2d6";

        // Get the category slug from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const categorySlug = urlParams.get('category');

        async function fetchCategoryPosts() {
            try {
                console.log(`Fetching posts for category: ${categorySlug}`);
                const response = await fetch(`${API_URL}?key=${API_KEY}&include=tags&filter=tags:${categorySlug}`);
                if (!response.ok) {
                    throw new Error(`Network response was not ok: ${response.statusText}`);
                }
                const data = await response.json();
                console.log('Category posts fetched successfully:', data);

                populatePosts(data.posts);
            } catch (error) {
                console.error('Error fetching data from Ghost API:', error);
            }
        }

        function populatePosts(posts) {
            const postsTable = document.getElementById('postsTable').getElementsByTagName('tbody')[0];
            postsTable.innerHTML = '';

            posts.forEach(post => {
                const row = postsTable.insertRow();

                // Create Title cell
                const titleCell = row.insertCell(0);
                const postLink = document.createElement('a');
                postLink.href = `/pages/html/post.html?id=${post.id}`;
                postLink.textContent = post.title;
                titleCell.appendChild(postLink);

                // Create Date cell
                const dateCell = row.insertCell(1);
                dateCell.textContent = new Date(post.published_at).toLocaleDateString();
            });

            console.log('Posts table populated successfully.');
        }

        fetchCategoryPosts();
    </script>
</body>
</html>
