<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="/pages/css/altstyles.css">
</head>

    <div class="container">
        <header>
            <nav>
                <div class="logo">
                    <h1><a href="/index.html">Kris Yotam</a></h1>

                    <ul>
                        <li><a href="/pages/html/about.html">About</a></li>
